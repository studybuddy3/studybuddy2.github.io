<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeterEmbeder.TM</title>

    <style>
        body {
            background-color: powderblue;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        input {
            width: 70%;
            padding: 8px;
            margin-top: 10px;
        }

        button {
            padding: 8px 12px;
            margin: 10px 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Hi, this is the first public release of BeterEmbeder.TM</h1>

<h2>
    Works best on 
    <a href="https://azgames.io" target="_blank">azgames.io</a><br><br>
    Reloading may break things.<br>
    Copy URLs instead of clicking links.
</h2>

<input type="text" id="urlInput" placeholder="Enter URL here">

<br>

<button onclick="openBlank()">Embed (about:blank)</button>
<button onclick="openBlobIframe()">Open (Blob Method)</button>

<script>
let win;

// Fix URL helper
function fixUrl(url) {
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
        return 'https://' + url;
    }
    return url;
}

// Method 1: about:blank iframe
function openBlank() {
    let url = document.getElementById('urlInput').value.trim();

    if (!url) {
        alert("Please enter a URL");
        return;
    }

    url = fixUrl(url);

    if (win && !win.closed) {
        win.focus();
    } else {
        win = window.open();
        win.document.body.style.margin = '0';

        let iframe = win.document.createElement('iframe');
        iframe.style.border = 'none';
        iframe.style.width = '100%';
        iframe.style.height = '100vh';
        iframe.src = url;

        win.document.body.appendChild(iframe);
    }
}

// Method 2: Blob iframe
function openBlobIframe() {
    let url = document.getElementById('urlInput').value.trim();

    if (!url) {
        alert("Please enter a URL");
        return;
    }

    url = fixUrl(url);

    const htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
            <title>Blob Iframe</title>
            <style>
                html, body {
                    margin: 0;
                    padding: 0;
                    height: 100%;
                }
                iframe {
                    width: 100%;
                    height: 100%;
                    border: none;
                }
            </style>
        </head>
        <body>
            <iframe src="${url}"></iframe>
        </body>
        </html>
    `;

    const blob = new Blob([htmlContent], { type: 'text/html' });
    const blobUrl = URL.createObjectURL(blob);

    window.open(blobUrl, '_blank');
}
</script>
